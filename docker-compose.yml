version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - discrepancy-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: inventory_discrepancy_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d inventory_discrepancy_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - discrepancy-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - discrepancy-net

volumes:
  postgres_data:

networks:
  discrepancy-net:
    driver: bridge
